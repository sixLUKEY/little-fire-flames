<dialog #dialogRef class="lff-dialog">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <h2 class="text-xl font-semibold mb-4">Create Teacher</h2>
    
    <div class="space-y-2">
      <label class="block text-sm font-medium">
        Name
        <input 
          formControlName="name" 
          type="text" 
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2"
          required
        />
      </label>
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-medium">
        Description
        <textarea 
          formControlName="description" 
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2"
          rows="3"
          required
        ></textarea>
      </label>
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-medium">
        Class <span class="text-gray-500 font-normal">(optional — classes assign teachers, not the other way around)</span>
        <select 
          formControlName="classId" 
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2"
        >
          <option value="">None</option>
          @for (cls of classes(); track cls.classId) {
            <option [value]="cls.classId">{{ cls.name }} ({{ cls.classId }})</option>
          }
        </select>
      </label>
    </div>

    <div class="flex gap-2 justify-end mt-6">
      <button 
        type="button" 
        (click)="closeDialog()"
        class="px-4 py-2 rounded-md border border-gray-300 hover:bg-gray-50"
      >
        Cancel
      </button>
      <button 
        type="submit" 
        [disabled]="form.invalid"
        class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Submit
      </button>
    </div>
  </form>
</dialog>
