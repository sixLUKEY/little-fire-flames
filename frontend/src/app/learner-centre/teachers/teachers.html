<div class="lff-page-inner">
  <h2 class="lff-page-title">Teachers</h2>

  <div class="lff-entity-actions">
    <button type="button" class="lff-pane lff-pane-create" (click)="dialogService.show('createTeacher')">Add Teacher</button>
  </div>

  <section class="lff-entity-list-section">
    <h3 class="lff-entity-list-title">Manage teachers</h3>
    <div class="lff-entity-select-row">
      <label class="lff-entity-select-label" for="teacher-select">Select teacher</label>
      <select
        id="teacher-select"
        class="lff-entity-select"
        [ngModel]="selectedId()"
        (ngModelChange)="selectedId.set($event)"
      >
        <option value="">— Select a teacher —</option>
        @for (t of entities(); track t.teacherId) {
          <option [value]="t.teacherId">{{ t.name }} ({{ t.teacherId }})</option>
        }
      </select>
    </div>
    @if (selectedId(); as id) {
      <div class="lff-entity-actions-inline">
        <button type="button" class="lff-btn lff-btn-update" (click)="openUpdate(id)">Update</button>
        <button type="button" class="lff-btn lff-btn-delete" (click)="openDelete(id)">Delete</button>
      </div>
    }
  </section>
</div>
