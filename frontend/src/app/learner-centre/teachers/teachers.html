<div class="lff-page-inner">
  <h2 class="lff-page-title">Teachers</h2>
  <div class="lff-pane-grid">
    <button type="button" class="lff-pane lff-pane-create" (click)="dialogService.show('createTeacher')">Create Teacher</button>
    <button type="button" class="lff-pane lff-pane-update" (click)="dialogService.show('updateTeacher')">Update Teacher</button>
    <button type="button" class="lff-pane lff-pane-delete" (click)="dialogService.show('deleteTeacher')">Delete Teacher</button>
    <button type="button" class="lff-pane lff-pane-display" (click)="displayEntity()">Display Teachers</button>
  </div>
  <div class="lff-response-box">
    <h3 class="lff-response-title">Response</h3>
    <pre class="lff-response-content">{{ textToDisplay() }}</pre>
  </div>
</div>
