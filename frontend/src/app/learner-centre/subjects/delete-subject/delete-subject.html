<dialog #dialogRef class="lff-dialog">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <h2 class="text-xl font-semibold mb-4">Delete Subject</h2>

    <div class="space-y-2">
      <label class="block text-sm font-medium">Select subject</label>
      <select formControlName="subjectId" class="dialog-select">
        <option value="">— Select a subject —</option>
        @for (s of subjects(); track s.subjectId) {
          <option [value]="s.subjectId">{{ s.name }} ({{ s.subjectId }})</option>
        }
      </select>
    </div>

    @if (selectedSubject; as subject) {
      <div class="p-3 rounded-lg bg-[var(--lff-danger-soft)] border border-[var(--lff-border)]">
        <p class="text-sm font-medium text-[var(--lff-ink)]">You are about to delete:</p>
        <p class="mt-1 text-sm">{{ subject.name }} ({{ subject.subjectId }})</p>
        <p class="text-xs text-[var(--lff-ink-muted)] mt-1">{{ subject.description }}</p>
      </div>
    }

    <div class="flex gap-2 justify-end mt-6">
      <button type="button" (click)="closeDialog()" class="dialog-btn-secondary">Cancel</button>
      <button type="submit" [disabled]="!form.controls['subjectId'].value" class="dialog-btn-danger">Delete</button>
    </div>
  </form>
</dialog>
