<dialog #dialogRef class="lff-dialog">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <h2 class="text-xl font-semibold mb-4">Update Learner</h2>

    <div class="space-y-2">
      <label class="block text-sm font-medium">Select learner</label>
      <select
        formControlName="studentId"
        (change)="onLearnerSelected()"
        class="dialog-select"
      >
        <option value="">— Select a learner —</option>
        @for (l of learners(); track l.studentId) {
          <option [value]="l.studentId">{{ l.name }} ({{ l.studentId }})</option>
        }
      </select>
    </div>

    @if (form.controls['studentId'].value) {
      <div class="space-y-4 pt-2 border-t border-[var(--lff-border)]">
        <div class="space-y-2">
          <label class="block text-sm font-medium">Name</label>
          <input formControlName="name" type="text" class="dialog-input" />
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-medium">Class</label>
          <select formControlName="classId" class="dialog-select">
            <option value="">— Select a class —</option>
            @for (cls of classes(); track cls.classId) {
              <option [value]="cls.classId">{{ cls.name }} ({{ cls.classId }})</option>
            }
          </select>
        </div>
      </div>
    }

    <div class="flex gap-2 justify-end mt-6">
      <button type="button" (click)="closeDialog()" class="dialog-btn-secondary">Cancel</button>
      <button
        type="submit"
        [disabled]="!form.controls['studentId'].value"
        class="dialog-btn-primary"
      >
        Update
      </button>
    </div>
  </form>
</dialog>
