<dialog #dialogRef class="lff-dialog">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <h2 class="text-xl font-semibold mb-4">Delete Class</h2>

    <div class="space-y-2">
      <label class="block text-sm font-medium">Select class</label>
      <select formControlName="classId" class="dialog-select">
        <option value="">— Select a class —</option>
        @for (c of classes(); track c.classId) {
          <option [value]="c.classId">{{ c.name }} ({{ c.classId }})</option>
        }
      </select>
    </div>

    @if (selectedClass; as cls) {
      <div class="p-3 rounded-lg bg-[var(--lff-danger-soft)] border border-[var(--lff-border)]">
        <p class="text-sm font-medium text-[var(--lff-ink)]">You are about to delete:</p>
        <p class="mt-1 text-sm">{{ cls.name }} ({{ cls.classId }}) — Teacher: {{ cls.teacherId }}</p>
      </div>
    }

    <div class="flex gap-2 justify-end mt-6">
      <button type="button" (click)="closeDialog()" class="dialog-btn-secondary">Cancel</button>
      <button type="submit" [disabled]="!form.controls['classId'].value" class="dialog-btn-danger">Delete</button>
    </div>
  </form>
</dialog>
