<div class="lff-page-inner">
  <h2 class="lff-page-title">Classes</h2>
  <div class="lff-pane-grid">
    <button type="button" class="lff-pane lff-pane-create" (click)="dialogService.show('createClass')">Create Class</button>
    <button type="button" class="lff-pane lff-pane-update" (click)="dialogService.show('updateClass')">Update Class</button>
    <button type="button" class="lff-pane lff-pane-delete" (click)="dialogService.show('deleteClass')">Delete Class</button>
    <button type="button" class="lff-pane lff-pane-display" (click)="displayEntity()">Display Classes</button>
  </div>
  <div class="lff-response-box">
    <h3 class="lff-response-title">Response</h3>
    <pre class="lff-response-content">{{ textToDisplay() }}</pre>
  </div>
</div>
