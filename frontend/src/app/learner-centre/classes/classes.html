<div class="lff-page-inner">
  <h2 class="lff-page-title">Classes</h2>

  <div class="lff-entity-actions">
    <button type="button" class="lff-pane lff-pane-create" (click)="dialogService.show('createClass')">Add Class</button>
  </div>

  <section class="lff-entity-list-section">
    <h3 class="lff-entity-list-title">Manage classes</h3>
    <div class="lff-entity-select-row">
      <label class="lff-entity-select-label" for="class-select">Select class</label>
      <select
        id="class-select"
        class="lff-entity-select"
        [ngModel]="selectedId()"
        (ngModelChange)="selectedId.set($event)"
      >
        <option value="">— Select a class —</option>
        @for (c of entities(); track c.classId) {
          <option [value]="c.classId">{{ c.name }} ({{ c.classId }})</option>
        }
      </select>
    </div>
    @if (selectedId(); as id) {
      <div class="lff-entity-actions-inline">
        <button type="button" class="lff-btn lff-btn-update" (click)="openUpdate(id)">Update</button>
        <button type="button" class="lff-btn lff-btn-delete" (click)="openDelete(id)">Delete</button>
      </div>
    }
  </section>
</div>
