<dialog #dialogRef class="lff-dialog">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <h2 class="text-xl font-semibold mb-4">Update Class</h2>

    <div class="space-y-2">
      <label class="block text-sm font-medium">Select class</label>
      <select
        formControlName="classId"
        (change)="onClassSelected()"
        class="dialog-select"
      >
        <option value="">— Select a class —</option>
        @for (c of classes(); track c.classId) {
          <option [value]="c.classId">{{ c.name }} ({{ c.classId }})</option>
        }
      </select>
    </div>

    @if (form.controls['classId'].value) {
      <div class="space-y-4 pt-2 border-t border-[var(--lff-border)]">
        <div class="space-y-2">
          <label class="block text-sm font-medium">Name</label>
          <input formControlName="name" type="text" class="dialog-input" />
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-medium">Teacher</label>
          <select formControlName="teacherId" class="dialog-select">
            <option value="">— Select a teacher —</option>
            @for (t of teachers(); track t.teacherId) {
              <option [value]="t.teacherId">{{ t.name }} ({{ t.teacherId }})</option>
            }
          </select>
        </div>
        @if (subjectIdsArray.length === subjects().length && subjects().length > 0) {
          <div class="space-y-2">
            <label class="block text-sm font-medium mb-2">Subjects</label>
            <div class="border border-[var(--lff-border)] rounded-md p-3 max-h-40 overflow-y-auto space-y-2">
              @for (subject of subjects(); track subject.subjectId; let i = $index) {
                <label class="flex items-center gap-2 cursor-pointer hover:bg-[var(--lff-surface)] p-2 rounded">
                  <input type="checkbox" [formControl]="getSubjectControl(i)" class="rounded border-[var(--lff-border)]" />
                  <span class="text-sm font-medium">{{ subject.name }}</span>
                  <span class="text-xs text-[var(--lff-ink-muted)]">{{ subject.description }}</span>
                </label>
              }
            </div>
          </div>
        }
      </div>
    }

    <div class="flex gap-2 justify-end mt-6">
      <button type="button" (click)="closeDialog()" class="dialog-btn-secondary">Cancel</button>
      <button type="submit" [disabled]="!form.controls['classId'].value" class="dialog-btn-primary">Update</button>
    </div>
  </form>
</dialog>
