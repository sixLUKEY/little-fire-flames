<div class="login-page">
  <div class="login-card">
    <h1 class="login-title">Sign in</h1>
    <p class="login-subtitle">Staff sign in (teachers and principals).</p>

    @if (errorMessage()) {
      <div class="login-error" role="alert">{{ errorMessage() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="login-field">
        <label for="email" class="login-label">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="login-input"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>
      <div class="login-field">
        <label for="password" class="login-label">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="login-input"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>
      <button type="submit" class="login-submit" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <a routerLink="/" class="login-back">← Back to home</a>
  </div>
</div>
